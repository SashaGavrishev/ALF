name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/ALF-QMC/ALF.git
          git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          if git diff --quiet HEAD upstream/master; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch
        if: steps.check.outputs.up_to_date == 'false'
        run: git checkout -b sync/upstream-$(date +%Y-%m-%d)

      - name: Merge upstream
        if: steps.check.outputs.up_to_date == 'false'
        run: git merge upstream/master --no-commit --no-ff

      - name: Restore fork-specific files
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git checkout HEAD -- README.md CONTRIBUTING.md
          git rm -f .github/workflows/doc.yml \
                     .github/workflows/mirror.yml \
                     .github/workflows/mirror-template.yml 2>/dev/null || true

      - name: Commit
        if: steps.check.outputs.up_to_date == 'false'
        run: git diff --cached --quiet || git commit --no-edit

      - name: Push branch and open PR
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          BRANCH="sync/upstream-$(date +%Y-%m-%d)"
          git push -f origin HEAD:"$BRANCH"
          if ! gh pr list --repo "$GITHUB_REPOSITORY" --base master --head "$BRANCH" --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base master \
              --head "$BRANCH" \
              --title "Sync with upstream $(date +%Y-%m-%d)" \
              --body "Automated sync with [ALF-QMC/ALF](https://github.com/ALF-QMC/ALF) master."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
